<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AnimeUnity Player</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="container">
    <h1>🎬 AnimeUnity Player</h1>
    
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Cerca anime..." onkeypress="if(event.key==='Enter') searchAnime()" />
      <button onclick="searchAnime()">Cerca</button>
    </div>

    <div id="results"></div>
    <div id="episodes"></div>
    
    <div id="playerContainer" style="display:none;">
      <h2 id="currentTitle"></h2>
      <div id="videoPlayer"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
